server:
  tcp:
    v3:
      addr: "127.0.0.1:1887"
      protocol: "v3"
      max_connections: 10000
      read_timeout: 60s
      write_timeout: 60s
    v5:
      addr: "127.0.0.1:1888"
      protocol: "v5"
      max_connections: 10000
      read_timeout: 60s
      write_timeout: 60s
  websocket:
    v3:
      addr: "127.0.0.1:8887"
      path: "/mqtt"
      protocol: "v3"
    v5:
      addr: "127.0.0.1:8888"
      path: "/mqtt"
      protocol: "v5"
  http:
    plain:
      addr: "127.0.0.1:8092"
  amqp:
    plain:
      addr: "127.0.0.1:5674"
      max_connections: 10000
  amqp091:
    plain:
      addr: "127.0.0.1:5684"
      max_connections: 10000
  admin_api_addr: "127.0.0.1:9083"
  health_addr: "127.0.0.1:8083"
  health_enabled: true
  shutdown_timeout: 30s

broker:
  max_message_size: 1048576
  max_retained_messages: 10000
  retry_interval: 20s
  max_retries: 0
  max_qos: 2
  async_fan_out: false
  fan_out_workers: 0

session:
  max_sessions: 10000
  default_expiry_interval: 300
  max_offline_queue_size: 10000
  max_inflight_messages: 1000
  max_send_queue_size: 1000
  offline_queue_policy: "evict"
  inflight_overflow: 1
  pending_queue_size: 1000

log:
  level: "info"
  format: "text"

storage:
  type: "badger"
  badger_dir: "/tmp/fluxmq/node3/data"
  sync_writes: false

cluster:
  enabled: true
  node_id: "node3"
  etcd:
    data_dir: "/tmp/fluxmq/node3/etcd"
    bind_addr: "127.0.0.1:2382"
    client_addr: "127.0.0.1:2399"
    initial_cluster: "node1=http://127.0.0.1:2380,node2=http://127.0.0.1:2381,node3=http://127.0.0.1:2382"
    bootstrap: true
    hybrid_retained_size_threshold: 1024
  transport:
    bind_addr: "127.0.0.1:7950"
    peers:
      node1: "127.0.0.1:7948"
      node2: "127.0.0.1:7949"
    route_batch_max_size: 256
    route_batch_max_delay: 50ms
    route_batch_flush_workers: 8
    route_publish_timeout: 15s

queue_manager:
  auto_commit_interval: 5s

queues:
  - name: "mqtt"
    topics:
      - "$queue/#"
    reserved: true
