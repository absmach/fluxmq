services:
  node1:
    image: ghcr.io/absmach/fluxmq:latest
    command: ["-config", "/etc/fluxmq/config.yaml"]
    user: "0:0"
    network_mode: host
    volumes:
      - ./config/node1.yaml:/etc/fluxmq/config.yaml:ro
      - /tmp/fluxmq/node1:/tmp/fluxmq/node1
    restart: unless-stopped

  node2:
    image: ghcr.io/absmach/fluxmq:latest
    command: ["-config", "/etc/fluxmq/config.yaml"]
    user: "0:0"
    network_mode: host
    volumes:
      - ./config/node2.yaml:/etc/fluxmq/config.yaml:ro
      - /tmp/fluxmq/node2:/tmp/fluxmq/node2
    restart: unless-stopped
    depends_on:
      - node1

  node3:
    image: ghcr.io/absmach/fluxmq:latest
    command: ["-config", "/etc/fluxmq/config.yaml"]
    user: "0:0"
    network_mode: host
    volumes:
      - ./config/node3.yaml:/etc/fluxmq/config.yaml:ro
      - /tmp/fluxmq/node3:/tmp/fluxmq/node3
    restart: unless-stopped
    depends_on:
      - node1

  dashboard:
    image: ghcr.io/absmach/fluxmq-dashboard:latest
    network_mode: host
    environment:
      FLUXMQ_API_URL: ${FLUXMQ_API_URL:-http://127.0.0.1:9081}
      FLUXMQ_NODE_URLS: ${FLUXMQ_NODE_URLS:-http://127.0.0.1:9081,http://127.0.0.1:9082,http://127.0.0.1:9083}
      PORT: "3001"
    depends_on:
      - node1
    restart: unless-stopped
