services:
  fluxmq:
    image: ghcr.io/absmach/fluxmq:latest
    command: ["--config", "/etc/fluxmq/config.yaml"]
    ports:
      - "1883:1883"   # MQTT v3
      - "1884:1884"   # MQTT v5
      - "8083:8083"   # MQTT v3 over WebSocket
      - "8084:8084"   # MQTT v5 over WebSocket
      - "8080:8080"   # HTTP bridge
      - "8082:8082"   # Admin API
      - "5672:5672"   # AMQP 1.0
      - "5682:5682"   # AMQP 0.9.1
      - "8081:8081"   # Health
    volumes:
      - ${FLUXMQ_CONFIG:-./config.yaml}:/etc/fluxmq/config.yaml:ro
      - fluxmq-data:/tmp/fluxmq
    restart: unless-stopped

  dashboard:
    image: ghcr.io/absmach/fluxmq-dashboard:latest
    ports:
      - "3001:3001"
    environment:
      FLUXMQ_API_URL: ${FLUXMQ_API_URL:-http://fluxmq:8082}
      FLUXMQ_NODE_URLS: ${FLUXMQ_NODE_URLS:-http://fluxmq:8082}
    depends_on:
      fluxmq:
        condition: service_started
    restart: unless-stopped

volumes:
  fluxmq-data:
